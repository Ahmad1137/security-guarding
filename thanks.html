<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Haidery Guarding LTD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./images/logo.png">
    <link rel="stylesheet" href="style.css">
    <script defer src="layout.js"></script>
    <style>
        .thanks-wrap {
            min-height: 62vh;
            display: grid;
            place-items: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #f7f7f8, #eceef1);
        }

        .thanks-card {
            width: min(760px, 100%);
            background: #fff;
            border-radius: 18px;
            padding: 36px 28px;
            box-shadow: 0 18px 36px rgba(20, 31, 48, 0.12);
            text-align: center;
        }

        .thanks-card h1 {
            margin-bottom: 12px;
            font-size: clamp(1.8rem, 3.4vw, 2.6rem);
        }

        .thanks-card p {
            color: #434a54;
            margin-bottom: 24px;
        }
    </style>
</head>
<body data-page="contact">
    <div id="site-header"></div>

    <main class="thanks-wrap">
        <section class="thanks-card" aria-live="polite">
            <h1>Thank You</h1>
            <p>Your enquiry has been submitted successfully. Our team will contact you shortly.</p>
            <a class="btn btn-primary" href="index.html">Back to Home</a>
        </section>
    </main>

    <div id="site-footer"></div>
</body>
</html>
